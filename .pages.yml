media:
  - name: supporters
    label: Supporters
    input: public/supporters
    output: /supporters
  - name: projects
    label: Projects
    input: public/projects
    output: /projects
  - name: public
    label: Public Assets
    input: public
    output: /

content:
  - name: blog
    label: Blog
    type: collection
    path: src/pages/blog
    exclude:
      - index.astro
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      primary: title
      sort: date
      order: desc
    fields:
      - name: layout
        type: string
        hidden: true
        readonly: true
        default: ../../layouts/BlogLayout.astro
      - name: title
        type: string
        required: true
      - name: date
        type: string
        required: true
        default: "May 18, 2026"
      - name: excerpt
        type: text
        required: true
      - name: author
        type: string
      - name: body
        type: rich-text
        required: true

  - name: siteContent
    label: Site Content
    type: file
    path: src/data/site-content.json
    format: json
    fields:
      - name: contact
        type: object
        fields:
          - name: email
            type: string
            required: true
          - name: phoneDisplay
            label: Phone (Display)
            type: string
            required: true
          - name: phoneDial
            label: Phone (Dial)
            type: string
            required: true
      - name: navigation
        type: object
        list: true
        fields:
          - name: label
            type: string
            required: true
          - name: href
            type: string
            required: true
      - name: footer
        type: object
        fields:
          - name: leadership
            type: object
            list: true
            fields:
              - name: name
                type: string
                required: true
              - name: role
                type: string
                required: true
          - name: supporters
            type: object
            list: true
            fields:
              - name: name
                type: string
                required: true
              - name: image
                type: image
                required: true
              - name: href
                label: Link (Optional)
                type: string

  - name: homepageSections
    label: Homepage Sections
    type: group
    items:
      - name: homepageHero
        label: Hero
        type: file
        path: src/data/home/hero.json
        format: json
        fields:
          - name: eyebrow
            type: string
            required: true
          - name: title
            type: string
            required: true
          - name: description
            type: text
            required: true
          - name: ctaLabel
            type: string
            required: true
          - name: ctaHref
            type: string
            required: true

      - name: homepageMission
        label: Mission
        type: file
        path: src/data/home/mission.json
        format: json
        fields:
          - name: heading
            type: string
            required: true
          - name: subheading
            type: text
            required: true
          - name: intro
            type: text
            required: true
          - name: paragraphs
            type: text
            list: true
          - name: stats
            type: object
            list: true
            fields:
              - name: value
                type: string
                required: true
              - name: label
                type: string
                required: true

      - name: homepageAdditionalWork
        label: Additional Work
        type: file
        path: src/data/home/additional-work.json
        format: json
        fields:
          - name: heading
            type: string
            required: true
          - name: subheading
            type: text
            required: true
          - name: items
            type: object
            list: true
            fields:
              - name: title
                type: string
                required: true
              - name: badge
                type: string
              - name: paragraphs
                type: text
                list: true
              - name: bullets
                type: string
                list: true

      - name: homepagePresidentMessage
        label: Message From Our President
        type: file
        path: src/data/home/president-message.json
        format: json
        fields:
          - name: heading
            type: string
            required: true
          - name: greeting
            type: text
          - name: paragraphs
            type: text
            list: true
          - name: closing
            type: text
            required: true
          - name: name
            type: string
            required: true
          - name: role
            type: string
            required: true
